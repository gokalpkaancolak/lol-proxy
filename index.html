<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBA BÜYÜK LOL İDDİASI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #0a0a0f; color: #e8e6e0; min-height: 100vh; }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(120,83,255,0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,196,196,0.06) 0%, transparent 60%), #0a0a0f; }
    .container { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    .header h1 { font-size: clamp(20px, 5vw, 32px); font-weight: 700; color: #fff; letter-spacing: 3px; }
    
    /* --- SEKME (TAB) SİSTEMİ --- */
    .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; justify-content: center; }
    .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: Inter, sans-serif; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase; font-size: 12px; }
    .tab-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .tab-btn.active { background: #FFB800; color: #000; border-color: #FFB800; box-shadow: 0 0 15px rgba(255,184,0,0.3); }
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* --- TAN EFE İDDİASI ÖZEL TASARIM --- */
    .timer-container { text-align: center; margin-bottom: 1rem; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 0.5px solid rgba(11,206,232,0.2); box-shadow: inset 0 0 20px rgba(11,206,232,0.05); }
    .timer-lbl { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; font-weight: 600; }
    .timer-val { font-size: clamp(24px, 5vw, 36px); font-weight: 700; color: #0bcee8; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px rgba(11,206,232,0.4); }
    
    .target-lp-box { display: flex; justify-content: space-between; align-items: center; background: rgba(124,131,255,0.1); border: 1px solid rgba(124,131,255,0.3); color: #b0b5ff; padding: 16px 24px; border-radius: 12px; margin-bottom: 1.5rem; }
    .target-lp-box .target-name { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
    .target-lp-box .target-val { font-size: 18px; font-weight: 700; color: #fff; }
    .target-lp-box .rem-lp { text-align: right; }
    .target-lp-box .rem-lp-val { font-size: 28px; font-weight: 700; color: #FFB800; }

    /* --- GENEL TASARIMLAR --- */
    .leader-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 1.5rem; padding: 12px 24px; background: rgba(255,255,255,0.04); border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.08); }
    .leader-bar .lbl { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; }
    .leader-bar .val { font-size: 20px; font-weight: 600; color: #FFB800; margin-top: 2px; }
    .refresh-all-btn { display: block; width: 100%; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; padding: 10px; cursor: pointer; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; transition: background 0.15s, color 0.15s; }
    .refresh-all-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
    .players-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .tancan-grid { display: flex; justify-content: center; }
    .tancan-grid .player-card { width: 100%; max-width: 400px; }
    
    .player-card { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; position: relative; overflow: hidden; transition: border-color 0.15s; }
    .player-card:hover { border-color: rgba(255,255,255,0.16); }
    .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; margin-top: 4px; }
    .pname { font-size: 15px; font-weight: 700; color: #fff; }
    .rank-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
    .summoner-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .summoner-txt { font-size: 11px; color: rgba(255,255,255,0.3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-btn { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; text-decoration: none; white-space: nowrap; }
    .log-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
    .stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat-box { flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px; }
    .stat-box .num { font-size: 20px; font-weight: 600; line-height: 1; }
    .stat-box .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
    .win-box { background: rgba(59,109,17,0.25); } .win-box .num { color: #97C459; } .win-box .lbl { color: #639922; }
    .lose-box { background: rgba(163,45,45,0.25); } .lose-box .num { color: #F09595; } .lose-box .lbl { color: #E24B4A; }
    .wr-box { background: rgba(255,255,255,0.05); } .wr-box .num { color: #e8e6e0; } .wr-box .lbl { color: rgba(255,255,255,0.35); }
    
    .city-greeting { font-size: 11px; font-weight: 600; color: #6ee8f5; text-align: center; margin-bottom: 10px; padding: 6px; background: rgba(11,206,232,0.1); border-radius: 8px; border: 0.5px solid rgba(11,206,232,0.2); letter-spacing: 0.5px; }
    
    .progress-section { margin-bottom: 8px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-track { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .card-btns { display: flex; gap: 6px; margin-top: 10px; }
    .card-btn { flex: 1; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px; cursor: pointer; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.12); background: transparent; color: rgba(255,255,255,0.4); transition: background 0.15s, color 0.15s; }
    .card-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
    .card-btn:disabled { opacity: 0.4; cursor: default; }
    .status-txt { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .section-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
    
    /* Sıralama Listesi */
    .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02); margin-bottom: 6px; transition: border-color 0.15s; }
    .lb-row:hover { border-color: rgba(255,255,255,0.13); }
    .lb-pos { font-size: 16px; font-weight: 700; width: 24px; text-align: center; color: rgba(255,255,255,0.2); }
    .lb-pos.gold { color: #FFB800; } .lb-pos.silver { color: #9e9e9e; } .lb-pos.bronze { color: #cd7f32; }
    .lb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .lb-name { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
    .lb-rank { font-size: 11px; color: rgba(255,255,255,0.35); white-space: nowrap; }
    .lb-stats { display: flex; gap: 10px; align-items: center; }
    .lb-wr { font-size: 13px; font-weight: 600; color: #e8e6e0; }
    .lb-wl { font-size: 11px; color: rgba(255,255,255,0.3); }
    .lb-bar-wrap { width: 50px; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .lb-bar-fill { height: 100%; border-radius: 2px; }
    
    .footer { text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 2rem; }
    .footer a { color: rgba(55,138,221,0.7); text-decoration: none; }
    @media (max-width: 500px) { .lb-rank { display: none; } .lb-bar-wrap { display: none; } .target-lp-box { flex-direction: column; gap: 10px; text-align: center; } .target-lp-box .rem-lp { text-align: center; } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="header">
      <h1>CBA BÜYÜK LOL İDDİASI</h1>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" id="btn-tab1" onclick="switchTab('tab1')">50 Maç İddiası</button>
      <button class="tab-btn" id="btn-tab2" onclick="switchTab('tab2')">Tan Efe İddiası</button>
    </div>

    <!-- SEKME 1: 50 MAÇ İDDİASI -->
    <div id="tab1" class="tab-content active">
      <div class="leader-bar">
        <div>
          <div class="lbl">👑 Lider</div>
          <div class="val" id="leader-name">-</div>
        </div>
      </div>
      <button class="refresh-all-btn" onclick="refreshAll()">⟳ Tüm Verileri Güncelle</button>
      <div class="players-grid" id="players-grid"></div>
      <div style="margin-bottom:1.5rem;">
        <div class="section-title">Sıralama</div>
        <div id="lb-list"></div>
      </div>
    </div>

    <!-- SEKME 2: TAN EFE İDDİASI -->
    <div id="tab2" class="tab-content">
      <div class="timer-container">
        <div class="timer-lbl">İDDİANIN BİTMESİNE KALAN SÜRE</div>
        <div class="timer-val" id="timer-val">Yükleniyor...</div>
      </div>
      
      <div class="target-lp-box">
        <div>
          <div class="target-name">Hedef Rank</div>
          <div class="target-val">Diamond 4 (0 LP)</div>
        </div>
        <div class="rem-lp">
          <div class="target-name">Hedefe Kalan</div>
          <div class="rem-lp-val" id="kalan-lp">...</div>
        </div>
      </div>

      <button class="refresh-all-btn" onclick="fetchTanCan()" id="tancan-refresh-btn">⟳ Veriyi Güncelle</button>
      
      <div class="tancan-grid">
        <div class="player-card" id="tancan-card">
          <!-- Tan Can içeriği JS ile basılacak -->
        </div>
      </div>
    </div>

    <div class="footer" id="last-updated"></div>
    <div class="footer" style="margin-top:6px;">Riot API · <a href="https://www.leagueofgraphs.com" target="_blank">leagueofgraphs.com</a></div>
  </div>

  <script>
    var PROXY = '/api/riot';
    
    // --- TAB SİSTEMİ MANTIĞI ---
    function switchTab(tabId) {
      document.getElementById('tab1').classList.remove('active');
      document.getElementById('tab2').classList.remove('active');
      document.getElementById('btn-tab1').classList.remove('active');
      document.getElementById('btn-tab2').classList.remove('active');
      
      document.getElementById(tabId).classList.add('active');
      document.getElementById('btn-' + tabId).classList.add('active');
    }

    // --- GENEL DEĞİŞKENLER & FONKSİYONLAR ---
    var TOTAL = 50; 
    
    // Zümrüt 4 ve Diamond 4 aralığı (400 LP fark)
    var START_LP_TANCAN = 2000; // Emerald 4 taban LP
    var TARGET_LP = 2400; // Diamond 4 hedef LP
    
    var CITIES = [
      "", "Adana", "Adıyaman", "Afyonkarahisar", "Ağrı", "Amasya", "Ankara", "Antalya", "Artvin", "Aydın", "Balıkesir",
      "Bilecik", "Bingöl", "Bitlis", "Bolu", "Burdur", "Bursa", "Çanakkale", "Çankırı", "Çorum", "Denizli",
      "Diyarbakır", "Edirne", "Elazığ", "Erzincan", "Erzurum", "Eskişehir", "Gaziantep", "Giresun", "Gümüşhane", "Hakkari",
      "Hatay", "Isparta", "Mersin", "İstanbul", "İzmir", "Kars", "Kastamonu", "Kayseri", "Kırklareli", "Kırşehir",
      "Kocaeli", "Konya", "Kütahya", "Malatya", "Manisa", "Kahramanmaraş", "Mardin", "Muğla", "Muş", "Nevşehir",
      "Niğde", "Ordu", "Rize", "Sakarya", "Samsun", "Siirt", "Sinop", "Sivas", "Tekirdağ", "Tokat",
      "Trabzon", "Tunceli", "Şanlıurfa", "Uşak", "Van", "Yozgat", "Zonguldak", "Aksaray", "Bayburt", "Karaman",
      "Kırıkkale", "Batman", "Şırnak", "Bartın", "Ardahan", "Iğdır", "Yalova", "Karabük", "Kilis", "Osmaniye", "Düzce"
    ];

    var RC = {
      'Unranked':    { a:'#888780', b:'rgba(136,135,128,0.2)', t:'#b0afa8' },
      'IRON':        { a:'#7a4e42', b:'rgba(122,78,66,0.25)',  t:'#c4917f' },
      'BRONZE':      { a:'#cd7f32', b:'rgba(205,127,50,0.2)',  t:'#e8a96a' },
      'SILVER':      { a:'#9e9e9e', b:'rgba(158,158,158,0.2)', t:'#c8c8c8' },
      'GOLD':        { a:'#FFB800', b:'rgba(255,184,0,0.2)',   t:'#FFD666' },
      'PLATINUM':    { a:'#00c4c4', b:'rgba(0,196,196,0.2)',   t:'#5de8e8' },
      'EMERALD':     { a:'#00a86b', b:'rgba(0,168,107,0.2)',   t:'#4dce9a' },
      'DIAMOND':     { a:'#7c83ff', b:'rgba(124,131,255,0.2)', t:'#b0b5ff' },
      'MASTER':      { a:'#9d00ff', b:'rgba(157,0,255,0.2)',   t:'#cc66ff' },
      'GRANDMASTER': { a:'#e84040', b:'rgba(232,64,64,0.2)',   t:'#ff8080' },
      'CHALLENGER':  { a:'#0bcee8', b:'rgba(11,206,232,0.2)',  t:'#6ee8f5' }
    };
    var ROMAN = { I:'1', II:'2', III:'3', IV:'4' };
    var TIER_ORDER = { CHALLENGER:10, GRANDMASTER:9, MASTER:8, DIAMOND:7, EMERALD:6, PLATINUM:5, GOLD:4, SILVER:3, BRONZE:2, IRON:1, Unranked:0 };
    var DIV_ORDER = { I:4, II:3, III:2, IV:1 };

    var TIER_BASE_LP = { 'IRON':0, 'BRONZE':400, 'SILVER':800, 'GOLD':1200, 'PLATINUM':1600, 'EMERALD':2000, 'DIAMOND':2400, 'MASTER':2800, 'GRANDMASTER':2800, 'CHALLENGER':2800, 'Unranked':0 };
    var DIV_OFFSET = { 'IV':0, 'III':100, 'II':200, 'I':300, '':0 };

    function rankScore(p) {
      var t = TIER_ORDER[p.tier] || 0;
      var d = DIV_ORDER[p.division] || 0;
      var l = p.lp || 0;
      return t * 10000 + d * 1000 + l;
    }
    
    function getAbsoluteLP(p) {
      if(p.tier === 'Unranked' || !p.tier) return 0;
      var base = TIER_BASE_LP[p.tier] || 0;
      if (['MASTER','GRANDMASTER','CHALLENGER'].indexOf(p.tier) !== -1) return base + p.lp;
      var offset = DIV_OFFSET[p.division] || 0;
      return base + offset + p.lp;
    }

    function rc(tier) { return RC[tier] || RC['Unranked']; }
    function capitalize(s) { if (!s) return ''; return s.charAt(0) + s.slice(1).toLowerCase(); }
    function rankLabel(tier, division, lp) {
      if (!tier || tier === 'Unranked') return 'Unranked';
      var single = ['MASTER','GRANDMASTER','CHALLENGER'];
      if (single.indexOf(tier) !== -1) return capitalize(tier) + ' - ' + lp + ' LP';
      return capitalize(tier) + ' ' + (ROMAN[division] || division) + ' - ' + lp + ' LP';
    }

    // --- SABİTLENMİŞ OYUNCULARIN LİSTESİ ---
    var LOCKED_DATA = {
      'Gökalp': { tier: 'PLATINUM', division: 'IV', lp: 65, wins: 24, losses: 26 },
      'Emre': { tier: 'PLATINUM', division: 'IV', lp: 60, wins: 24, losses: 26 },
      'Ömer': { tier: 'GOLD', division: 'III', lp: 67, wins: 17, losses: 33 },
      'Ömer (İkinci Hesap)': { tier: 'GOLD', division: 'II', lp: 19, wins: 18, losses: 32 }
    };

    var DEF = [
      { name:'Gökalp', gameName:'teigoff', tag:'8255',  tier:'Unranked', division:'', lp:0, wins:0, losses:0 },
      { name:'Ömer',   gameName:'LASHERZ', tag:'GRT27', tier:'Unranked', division:'', lp:0, wins:0, losses:0 },
      { name:'Uğur',   gameName:'puboiES', tag:'2221',  tier:'Unranked', division:'', lp:0, wins:0, losses:0 },
      { name:'Emre',   gameName:'hotchess',tag:'576',   tier:'Unranked', division:'', lp:0, wins:0, losses:0 },
      { name:'Polat',  gameName:'aoh',     tag:'www',   tier:'Unranked', division:'', lp:0, wins:0, losses:0 },
      { name:'Ömer (İkinci Hesap)', gameName:'Lasherzz', tag:'6980', tier:'Unranked', division:'', lp:0, wins:0, losses:0 }
    ];

    var players = JSON.parse(localStorage.getItem('lol_v7') || 'null') || DEF;
    for (var i = 0; i < players.length; i++) { players[i].loading = false; players[i].error = ''; }

    function persist() {
      var toSave = players.map(function(p) { return { name:p.name, gameName:p.gameName, tag:p.tag, tier:p.tier, division:p.division, lp:p.lp, wins:p.wins, losses:p.losses }; });
      localStorage.setItem('lol_v7', JSON.stringify(toSave));
      localStorage.setItem('lol_v7_ts', new Date().toISOString());
    }

    function fetchPlayer(i) {
      var p = players[i];
      if (!p.gameName || !p.tag) return Promise.resolve();

      // Biten maçlar için sabit verileri yükle
      if (LOCKED_DATA[p.name]) {
        var ld = LOCKED_DATA[p.name];
        p.tier = ld.tier; p.division = ld.division; p.lp = ld.lp; p.wins = ld.wins; p.losses = ld.losses;
        p.loading = false; p.error = '';
        persist(); renderCard(i); renderLeaderboard(); updateTimestamp();
        return Promise.resolve();
      }

      p.loading = true; p.error = '';
      renderCard(i);
      return fetch(PROXY + '?region=europe&path=riot/account/v1/accounts/by-riot-id/' + p.gameName + '/' + p.tag)
        .then(function(r) { return r.json(); })
        .then(function(acc) {
          if (!acc.puuid) throw new Error(acc.status ? acc.status.message : 'Hesap bulunamadı');
          return fetch(PROXY + '?path=lol/league/v4/entries/by-puuid/' + acc.puuid);
        })
        .then(function(r) { return r.json(); })
        .then(function(rankData) {
          var entries = Array.isArray(rankData) ? rankData : [rankData];
          var solo = null;
          for (var j = 0; j < entries.length; j++) {
            if (entries[j].queueType === 'RANKED_SOLO_5x5') { solo = entries[j]; break; }
          }
          if (solo) {
            p.tier = solo.tier; p.division = solo.rank;
            p.lp = solo.leaguePoints; p.wins = solo.wins; p.losses = solo.losses;
          } else {
            p.tier = 'Unranked'; p.division = ''; p.lp = 0; p.wins = 0; p.losses = 0;
          }
          p.error = '';
        })
        .catch(function(err) { p.error = err.message || 'Hata'; })
        .then(function() {
          p.loading = false; persist(); renderCard(i); renderLeaderboard(); updateTimestamp();
        });
    }

    function refreshAll() {
      var promises = [];
      for (var i = 0; i < players.length; i++) {
        if (players[i].gameName && players[i].tag) promises.push(fetchPlayer(i));
      }
      return Promise.all(promises);
    }

    function renderCard(i) {
      var p = players[i];
      var card = document.getElementById('card-' + i);
      if (!card) return;
      var played = p.wins + p.losses;
      var rem = Math.max(0, TOTAL - played);
      var wr = played > 0 ? Math.round(p.wins / played * 100) : 0;
      var pct = Math.min(100, Math.round(played / TOTAL * 100));
      var c = rc(p.tier);
      var rl = rankLabel(p.tier, p.division, p.lp);
      var hasAcc = p.gameName && p.tag;
      var logUrl = hasAcc ? 'https://www.leagueofgraphs.com/summoner/euw/' + p.gameName.toLowerCase() + '-' + p.tag : '';
      
      // Sabitlenmiş bir oyuncuysa veya maçları bittiyse "Yenile" butonunu gösterme
      var isLocked = !!LOCKED_DATA[p.name];
      var refreshBtnHtml = (hasAcc && !isLocked) ? '<button class="card-btn" onclick="fetchPlayer(' + i + ')" ' + (p.loading ? 'disabled' : '') + '>⟳ Yenile</button>' : '';
      var btnsContainer = refreshBtnHtml ? '<div class="card-btns">' + refreshBtnHtml + '</div>' : '';

      var cityHtml = "";
      var plateStr = p.wins.toString() + p.losses.toString();
      var plate = parseInt(plateStr, 10);
      if (plate >= 1 && plate <= 81) cityHtml = '<div class="city-greeting">🚕 ' + CITIES[plate] + ' şehrine selamlar!</div>';

      card.innerHTML =
        '<div class="accent-bar" style="background:' + c.a + '"></div>' +
        '<div class="name-row"><div class="pname">' + p.name + '</div><div class="rank-badge" style="background:' + c.b + ';color:' + c.t + '">' + rl + '</div></div>' +
        '<div class="summoner-row"><div class="summoner-txt">' + (hasAcc ? p.gameName + '#' + p.tag : '— hesap eklenmedi') + '</div>' + (logUrl ? '<a class="log-btn" href="' + logUrl + '" target="_blank">LoG</a>' : '') + (hasAcc ? '<a class="log-btn" href="https://www.op.gg/summoners/euw/' + p.gameName + '-' + p.tag + '" target="_blank">OP.GG</a>' : '') + '</div>' +
        (p.loading ? '<div class="status-txt"><span class="status-dot" style="background:#FFB800"></span>Yükleniyor...</div>' : '') +
        (p.error ? '<div class="status-txt"><span class="status-dot" style="background:#E24B4A"></span>' + p.error + '</div>' : '') +
        '<div class="stats-row"><div class="stat-box win-box"><div class="num">' + p.wins + '</div><div class="lbl">Galibiyet</div></div><div class="stat-box lose-box"><div class="num">' + p.losses + '</div><div class="lbl">Mağlubiyet</div></div><div class="stat-box wr-box"><div class="num">' + wr + '%</div><div class="lbl">Oran</div></div></div>' +
        cityHtml +
        '<div class="progress-section"><div class="progress-label"><span>' + played + ' / ' + TOTAL + ' mac</span><span style="font-weight:600;color:' + (rem === 0 ? '#97C459' : 'rgba(255,255,255,0.6)') + '">' + rem + ' kalan</span></div><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + c.a + '"></div></div></div>' +
        btnsContainer;
    }

    function renderLeaderboard() {
      var sorted = players.slice().map(function(p, i) { return { p:p, i:i, score:rankScore(p) }; });
      sorted.sort(function(a, b) { return b.score - a.score; });
      document.getElementById('leader-name').textContent = sorted[0].score > 0 ? sorted[0].p.name : '-';
      var posColors = ['gold','silver','bronze','','',''];
      var list = document.getElementById('lb-list');
      list.innerHTML = '';
      for (var idx = 0; idx < sorted.length; idx++) {
        var p = sorted[idx].p;
        var played = p.wins + p.losses;
        var wr = played > 0 ? Math.round(p.wins / played * 100) : 0;
        var c = rc(p.tier);
        var rl = rankLabel(p.tier, p.division, p.lp);
        var row = document.createElement('div');
        row.className = 'lb-row';
        var emoji = idx === 0 ? ' 👑' : (idx === sorted.length - 1 ? ' 😂' : '');
        row.innerHTML = '<div class="lb-pos ' + posColors[idx] + '">' + (idx+1) + '</div><div class="lb-dot" style="background:' + c.a + '"></div><div class="lb-name">' + p.name + emoji + '</div><div class="lb-rank">' + rl + '</div><div class="lb-stats"><div class="lb-bar-wrap"><div class="lb-bar-fill" style="width:' + wr + '%;background:' + c.a + '"></div></div><div class="lb-wr">' + wr + '%</div><div class="lb-wl">' + p.wins + 'G ' + p.losses + 'M</div></div>';
        list.appendChild(row);
      }
    }


    // --- SEKME 2 (TAN EFE) VERİ VE MANTIĞI ---
    var tanCan = JSON.parse(localStorage.getItem('lol_v7_tancan') || 'null') || { name:'Tan Can', gameName:'Tcbspeedrun', tag:'3131', tier:'Unranked', division:'', lp:0, wins:0, losses:0 };
    tanCan.loading = false; tanCan.error = '';

    function persistTanCan() {
      localStorage.setItem('lol_v7_tancan', JSON.stringify({ name:tanCan.name, gameName:tanCan.gameName, tag:tanCan.tag, tier:tanCan.tier, division:tanCan.division, lp:tanCan.lp, wins:tanCan.wins, losses:tanCan.losses }));
    }

    function fetchTanCan() {
      var p = tanCan;
      var btn = document.getElementById('tancan-refresh-btn');
      p.loading = true; p.error = '';
      btn.disabled = true;
      btn.innerText = 'Yükleniyor...';
      renderTanCan();

      return fetch(PROXY + '?region=europe&path=riot/account/v1/accounts/by-riot-id/' + p.gameName + '/' + p.tag)
        .then(function(r) { return r.json(); })
        .then(function(acc) {
          if (!acc.puuid) throw new Error(acc.status ? acc.status.message : 'Hesap bulunamadı');
          return fetch(PROXY + '?region=tr1&path=lol/league/v4/entries/by-puuid/' + acc.puuid);
        })
        .then(function(r) { return r.json(); })
        .then(function(rankData) {
          var entries = Array.isArray(rankData) ? rankData : [rankData];
          var solo = null;
          for (var j = 0; j < entries.length; j++) {
            if (entries[j].queueType === 'RANKED_SOLO_5x5') { solo = entries[j]; break; }
          }
          if (solo) {
            p.tier = solo.tier; p.division = solo.rank;
            p.lp = solo.leaguePoints; p.wins = solo.wins; p.losses = solo.losses;
          } else {
            p.tier = 'Unranked'; p.division = ''; p.lp = 0; p.wins = 0; p.losses = 0;
          }
          p.error = '';
        })
        .catch(function(err) { p.error = err.message || 'Hata'; })
        .then(function() {
          p.loading = false;
          btn.disabled = false;
          btn.innerText = '⟳ Veriyi Güncelle';
          persistTanCan();
          renderTanCan();
          updateTimestamp();
        });
    }

    function renderTanCan() {
      var p = tanCan;
      var card = document.getElementById('tancan-card');
      var played = p.wins + p.losses;
      var wr = played > 0 ? Math.round(p.wins / played * 100) : 0;
      var c = rc(p.tier);
      var rl = rankLabel(p.tier, p.division, p.lp);
      
      var logUrl = 'https://www.leagueofgraphs.com/summoner/tr/' + p.gameName.toLowerCase() + '-' + p.tag;
      var opggUrl = 'https://www.op.gg/summoners/tr/' + p.gameName + '-' + p.tag;
      
      var currentAbsLP = getAbsoluteLP(p);
      
      // Zümrüt 4 (2000) - Diamond 4 (2400) arası mesafe 400 LP'dir.
      var totalJourney = TARGET_LP - START_LP_TANCAN;
      
      var lpNeeded = TARGET_LP - currentAbsLP;
      if (lpNeeded < 0) lpNeeded = 0; 

      var lpEarned = currentAbsLP - START_LP_TANCAN;
      if (lpEarned < 0) lpEarned = 0;

      document.getElementById('kalan-lp').innerText = lpNeeded + " LP";

      var pct = Math.min(100, Math.round((lpEarned / totalJourney) * 100));

      card.innerHTML =
        '<div class="accent-bar" style="background:' + c.a + '"></div>' +
        '<div class="name-row"><div class="pname">' + p.name + '</div><div class="rank-badge" style="background:' + c.b + ';color:' + c.t + '">' + rl + '</div></div>' +
        '<div class="summoner-row"><div class="summoner-txt">' + p.gameName + '#' + p.tag + '</div><a class="log-btn" href="' + logUrl + '" target="_blank">LoG</a><a class="log-btn" href="' + opggUrl + '" target="_blank">OP.GG</a></div>' +
        (p.loading ? '<div class="status-txt"><span class="status-dot" style="background:#FFB800"></span>Yükleniyor...</div>' : '') +
        (p.error ? '<div class="status-txt"><span class="status-dot" style="background:#E24B4A"></span>' + p.error + '</div>' : '') +
        '<div class="stats-row"><div class="stat-box win-box"><div class="num">' + p.wins + '</div><div class="lbl">Galibiyet</div></div><div class="stat-box lose-box"><div class="num">' + p.losses + '</div><div class="lbl">Mağlubiyet</div></div><div class="stat-box wr-box"><div class="num">' + wr + '%</div><div class="lbl">Oran</div></div></div>' +
        '<div class="progress-section"><div class="progress-label"><span>Zümrüt 4 → Diamond 4 İlerlemesi</span><span style="font-weight:600;color:' + (lpNeeded === 0 ? '#97C459' : 'rgba(255,255,255,0.6)') + '">' + pct + '%</span></div><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + c.a + '"></div></div></div>';
    }

    // --- GERİ SAYIM SAYACI ---
    function initTimer() {
      // 8 Mayıs 2026, Saat 19:36 (Aylar 0'dan başlar, o yüzden Mayıs=4)
      var targetDate = new Date(2026, 4, 8, 19, 36, 0).getTime();
      
      setInterval(function() {
        var now = new Date().getTime();
        var diff = targetDate - now;
        
        if (diff < 0) {
          document.getElementById('timer-val').innerText = "İDDİA SÜRESİ DOLDU!";
          return;
        }
        
        var days = Math.floor(diff / (1000 * 60 * 60 * 24));
        var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        var secs = Math.floor((diff % (1000 * 60)) / 1000);
        
        hours = hours < 10 ? "0" + hours : hours;
        mins = mins < 10 ? "0" + mins : mins;
        secs = secs < 10 ? "0" + secs : secs;
        
        document.getElementById('timer-val').innerText = days + " GÜN " + hours + ":" + mins + ":" + secs;
      }, 1000);
    }

    // --- TEMEL SİSTEM İŞLEMLERİ ---
    function render() {
      var grid = document.getElementById('players-grid');
      grid.innerHTML = '';
      for (var i = 0; i < players.length; i++) {
        var card = document.createElement('div');
        card.className = 'player-card';
        card.id = 'card-' + i;
        grid.appendChild(card);
        renderCard(i);
      }
      renderLeaderboard();
      renderTanCan();
      updateTimestamp();
    }

    function updateTimestamp() {
      var ts = localStorage.getItem('lol_v7_ts');
      if (ts) {
        var d = new Date(ts);
        document.getElementById('last-updated').textContent = 'Son güncelleme: ' + d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
      }
    }

    // Sayfa açıldığında başlat
    render();
    refreshAll();
    fetchTanCan();
    initTimer();
  </script>
</body>
</html>
